<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendLens — Finally know where your money actually goes</title>
    <meta name="description" content="Track bills, detect overspending, and get ahead of your finances — all in one calm dashboard." />

    <!-- Anti-FOUT theme script — runs before React to prevent flash -->
    <script>
      (function(){
        var t = localStorage.getItem('spendlens-theme');
        if(!t) t = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

    <!-- Google Fonts: Syne (display), DM Sans (body), JetBrains Mono (numbers) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet" />

    <!-- Favicon: SpendLens lens icon -->
    <link rel="icon" type="image/svg+xml" href="/spendlens-icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
